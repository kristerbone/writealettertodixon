version: 1
applications:
  - appRoot: app
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - envCache --set stackInfo ""
            - npm run build --workspace=app
      artifacts:
        baseDirectory: app/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - app/node_modules/**/*
