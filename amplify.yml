version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - envCache --set stackInfo ""
        - npm run build
  artifacts:
    baseDirectory: app/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - app/node_modules/**/*
