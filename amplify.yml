version: 1
applications:
  - appRoot: app
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - envCache --set stackInfo ""
            - npm run build --workspace=app
      artifacts:
        baseDirectory: app/dist
        files:
          - '**/*'
      customRules:
        - source: '</^[^.]+$|.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
          target: '/index.html'
          status: '200'
      cache:
        paths:
          - node_modules/**/*
          - app/node_modules/**/*
